# Site Settings
title: "Rahul Builds"
description: "Notes from a self-taught builder — AI agents, open source tools, and the stuff I figure out along the way."
url: "https://rahul.is-a.dev"
baseurl: ""

# Theme

# Author (simple string only)
author: "Rahul"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
